{% extends "tracker/base.html" %}

{% block content %}
<div class="container mt-5">
    <h2>Forgot Password</h2>
    <p>Enter your registered email address.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">
            Send Reset Link
        </button>
    </form>
</div>
{% endblock %}
