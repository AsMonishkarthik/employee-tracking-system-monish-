
{% extends "tracker/base.html" %}

{% block content %}

<div class="container">
    <h2 style="color:red;">⚠ Delete Employee</h2>

    <p>Are you sure you want to delete this employee?</p>

    <div class="card">
        <p><strong>Name:</strong> {{ employee.name }}</p>
        <p><strong>Email:</strong> {{ employee.email }}</p>
        <p><strong>Department:</strong> {{ employee.department }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <button type="submit" style="background:red; color:white; padding:10px 20px; border:none; border-radius:5px;">
            Delete
        </button>

        <a href="{% url 'dashboard' %}" 
           style="margin-left:10px; padding:10px 20px; background:gray; color:white; text-decoration:none; border-radius:5px;">
            Cancel
        </a>

    </form>
</div>

<style>
.container{
    width:500px;
    margin:40px auto;
    font-family:Arial, sans-serif;
}

.card{
    background:#f5f5f5;
    padding:15px;
    border-radius:6px;
    margin-bottom:20px;
}
</style>

{% endblock %}
```
