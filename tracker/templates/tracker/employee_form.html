{% extends 'tracker/base.html' %}

{% block content %}

<h2 class="text-center">Employee Form</h2>

<form method="POST" enctype="multipart/form-data" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-full">Save</button>
</form>
<br>
<p class="text-center">
    <a href="{% url 'dashboard' %}" class="btn">Back</a>
</p>

{% endblock %}
